name: BuildTests
permissions:
  contents: read
on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24, 26]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        name: Install pnpm
        with:
          version: 11
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          cache: 'pnpm'
          node-version: "${{ matrix.node-version }}"

      - name: allow write in work dir
        run: sudo chmod -R 777 .

      - name: Install Dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Check types
        run: pnpm check-types

      - name: Run unit tests
        run: pnpm test:unit

      - name: Check package docs before build
        run: pnpm check-package-artifacts --allow-missing-dist

      - name: Building niconicomments
        run: pnpm build

      - name: Check package artifacts
        run: pnpm check-package-artifacts
