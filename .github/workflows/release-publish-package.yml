name: publish package

on:
  push:
    branches:
      - master

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
    permissions:
      contents: read # Checkout repository contents for the publish build.
      id-token: write # Request an OIDC token for npm provenance.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        name: Install pnpm
        with:
          version: 11
          run_install: false

      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          scope: '@xpadev-net'
          cache: 'pnpm'

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Publish package
        run: npm publish --provenance

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: publish
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
    permissions:
      contents: write # Create the GitHub release for the published ref.
    steps:
      - name: Validate release ref
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/master" ]; then
            echo "::error::Ref ${GITHUB_REF} is not allowed to create a release"
            exit 1
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
